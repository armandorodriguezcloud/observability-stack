global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: ["alertname", "instance"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity = "critical"
      receiver: critical
      repeat_interval: 1h

receivers:
  - name: default
    # Configure a real webhook/email/Slack target for your environment.
    webhook_configs:
      - url: "http://127.0.0.1:5001/hook"
        send_resolved: true

  - name: critical
    webhook_configs:
      - url: "http://127.0.0.1:5001/critical"
        send_resolved: true

inhibit_rules:
  - source_matchers: [severity = "critical"]
    target_matchers: [severity = "warning"]
    equal: ["instance"]
