global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: homelab

rule_files:
  - "alert.rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          host: docker-host

  # Add additional homelab nodes here (each running node_exporter)
  - job_name: homelab-nodes
    static_configs:
      - targets:
          - "192.168.10.11:9100"
          - "192.168.10.12:9100"
          - "192.168.10.20:9100"
